<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PraxisWorld — Reference Knowledge Base</title>
    <meta name="description" content="Interactive reference map of the PraxisWorld survey: 191 cited works organized by the survey's narrative tree.">
    <meta property="og:title" content="PraxisWorld — Reference Knowledge Base">
    <meta property="og:description" content="Explore the 191 cited references of the PraxisWorld survey as an interactive, section-organized knowledge graph.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a73e8'/%3E%3Cpath d='M14 18h20c9 0 16 6 16 14s-7 14-16 14H22V34h12c2 0 4-1 4-3s-2-4-4-4H14z' fill='white'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bar">
        <div class="brand">
            <span class="eyebrow">Reference Knowledge Base</span>
            <h1>PraxisWorld <span class="sub">· Reference Map</span></h1>
        </div>
        <div class="stats">
            <div class="stat"><b id="stat-refs">—</b><span>References</span></div>
            <div class="stat"><b id="stat-secs">—</b><span>Sections</span></div>
            <div class="stat"><b id="stat-links">—</b><span>Citations</span></div>
        </div>
        <nav class="header-links">
            <a href="../index.html" class="ghost">← Project page</a>
            <a href="../assets/paper/praxisworld.pdf" target="_blank" rel="noopener">Paper PDF</a>
        </nav>
    </header>

    <div class="toolbar">
        <div class="seg" role="tablist" aria-label="View mode">
            <button id="view-graph" class="active" type="button">Graph</button>
            <button id="view-tree" type="button">Tree</button>
        </div>
        <label class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="search" type="search" placeholder="Search title, author, key…" autocomplete="off">
        </label>
        <button id="reset" class="tool-btn" type="button">Reset view</button>
        <div class="legend" id="legend"></div>
    </div>

    <div class="stage">
        <svg id="viz" role="img" aria-label="Reference knowledge graph"></svg>
        <div class="hint" id="hint">Drag to pan · scroll to zoom · click a node for details</div>
        <div class="loading" id="loading">Loading reference map…</div>

        <aside id="panel" aria-live="polite">
            <div class="phead">
                <span class="ptag" id="p-tag">Reference</span>
                <button class="pclose" id="p-close" aria-label="Close panel">×</button>
            </div>
            <div class="pbody" id="p-body"></div>
        </aside>
    </div>

    <script src="lib/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
